experiments:
  h7_sigma:
    pre_registration: docs/adr/ADR-026-h7-sigma.md
    pre_registration_amendment: docs/adr/ADR-026-v2.1-h7-sigma-amendment-inverted.md
    statistical_chain: docs/adr/ADR-027-h7-sigma-statistical-chain.md
    n_seeds: 30
    seed_range: [1400, 1429]
    pilot_seed_range: [9000, 9009]
    pilot_seed_status: BURNED
    constants:
      T_warmup: 5000
      T_stat: 50000
      B: 64                      # bins per pressure dimension; physical anchor (= D = 64)
      P_min: 0.0
      P_max: 1.0
      scalar: flatten_cell_tick
      laplace: asymmetric_plus_one_on_Q_when_P_gt_0_and_Q_eq_0
      entropy_correction: miller_madow
    test:
      kind: paired_wilcoxon_signed_rank
      alternatives:              # both pre-registered (v2.1 amendment §1)
        - greater                # original H1 direction (structural coupling)
        - less                   # mirrored bin (inverted coupling)
      zero_method: wilcox
      alpha: 0.005
      cohen_d_threshold_pass: 0.5
      cohen_d_threshold_feedback_only: 0.2
      double_reporting:
        primary_field: delta_sigma_corr
        transparency_field: delta_sigma_naive
        disagreement_override: H7_SIGMA_INCONCLUSIVE
      sample_size_guard:
        n_post_drop_min: 20
        violation_override: H7_SIGMA_INCONCLUSIVE
    primary_result:
      statistic_field: delta_sigma_corr
      wilcoxon_statistic_greater: 42.0
      p_value_greater: 0.9999908776953816
      p_value_less: 1.0399147868156433e-05
      cohen_d: -0.7580985095043327
      n_post_drop: 30
      verdict_isolated: H7_SIGMA_INVERTED
    transparency_result:
      statistic_field: delta_sigma_naive
      p_value_greater: 0.9999908776953816
      p_value_less: 1.0399147868156433e-05
      cohen_d: -0.7581114914989522
      n_post_drop: 30
      verdict_isolated: H7_SIGMA_INVERTED
    verdicts_agree: true
    verdict: H7_SIGMA_INVERTED
    diagnostics:
      median_delta_sigma_corr: -0.1480836246485
      median_delta_sigma_naive: -0.1480860465235
      median_K_R: 42.0
      median_K_S: 61.5
      median_K_M: 57.0
      median_K_R_minus_K_S: -19.0
      pilot_K_R_minus_K_S: -15.0
      sign_flip_vs_pilot: false
      total_clip_events: 0
    artefacts:
      - path: research/h7_sigma_run_results.csv
        sha256: 90ee2b80415178fe75cb9e1bd52350e980a6f260c7b7fc0fd65b65f022e674a3
      - path: research/h7_sigma_verdict.json
        sha256: 62a376b71b968ad8438a451a9fed8b13bb08f942421dcd87b5e228d045d22fe0
    interpretation: |
      H7-σ rejects in the direction OPPOSITE to the pre-registered H1-greater
      hypothesis. Under the real feedback loop, the agent's stationary
      action-pressure distribution is statistically CLOSER to the Markov-null
      baseline (KL-divergence terms) than the obs-shuffled control's is.
      Equivalent operational reading: the real loop concentrates pressure on a
      strict subset of state cells (median K_R = 42 vs K_S = 61.5 vs K_M = 57,
      out of B = 64); destroying the temporal order of observations DISPERSES
      the pressure profile away from the environment's stationary measure.

      Permitted vocabulary (ADR-026 v2.1 §7): "inverted coupling",
      "stabilising feedback" in the strict operational sense
      (d ≤ −0.5 ∧ p_less < 0.005). All cognitive vocabulary remains banned.

      The pilot run [9000-9009] (private) had already inscribed the
      K_R < K_S signature (median K_R−K_S = −15). The main run on the
      disjoint, pre-reserved pool [1400-1429] strengthens it
      (median K_R−K_S = −19) without sign flip, confirming the signature
      out-of-sample.

decision_record:
  path: docs/adr/ADR-029-h7-sigma-release.md
  sha256: db730ab0195c00cad1f1cd4c9982ca51e0fca7631da71a4519f566735e2c69bc
  ruling: |
    H7-σ as stated in ADR-026 v2 §2 (alternative=greater) is REJECTED.
    The mirrored bin formalised in ADR-026 v2.1 §1 (alternative=less,
    |d| ≥ 0.5, p < 0.005) is supported with verdicts agreeing across
    primary and transparency reportings. Released honestly under the
    precedent set by ADR-021 (H5) and ADR-025 (H6).

