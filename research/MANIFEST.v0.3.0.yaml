audit_trail:
  doctrine: |
    H₅ (v0.1.0) — null regime confirmed (rejection of pressure-scaling claim).
    H₆ (v0.2.0) — apparent topological signature falsified by obs-shuffled control.
    H₇-σ (v0.3.0) — directional inversion: real loop is closer to Markov-null
      stationary distribution than obs-shuffled control is. The first
      reproducible non-trivial signature in the CAE protocol, but in the
      direction opposite to the pre-registered prediction. Three consecutive
      pre-registered, frozen, falsification-disciplined experiments, each
      published with full data, ADR chain, and a Zenodo DOI.
    The instrument earns trust by refusing to confirm itself, AND by
    publishing inverted directional signals with the same rigour as
    confirmations.
