audit_trail:
  doctrine: |
    H₅ (v0.1.0) was a falsification of an agent-pressure scaling claim.
    H₆ (v0.2.0) is a falsification of a phase-space topological-signature
    claim, where the γ control specifically refutes the apparent β signal.
    The CAE protocol now has two consecutive published falsifications,
    each with full data, ADR chain, and a Zenodo DOI. This pattern is the
    instrument's main externally-validated property.

next_steps:
