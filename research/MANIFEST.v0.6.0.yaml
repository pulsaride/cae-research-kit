extended_validity_envelope:
  scope: |
    The formal scientific verdict for v0.6.0 is KAPPA_INCONCLUSIVE per
    ADR-034 §5.4. The following operational envelope is defended by the
    combination of (a) the sweep results above and (b) the ADR-035 PASS,
    and is published as a parallel non-overriding statement.
  envelope_status: ROBUST_BAND_LIMITED_de_facto
  band_variant: upper_open
  envelope_diffusion_range: [0.005, 0.320]
  envelope_n_octaves: 6
  envelope_min_cohen_d: 2.763514822944643      # at D=0.040
  envelope_max_cohen_d: 3.013621930330641      # at D=0.160
  envelope_min_n_positive: 29
  envelope_max_n_positive: 30
  envelope_max_p_greater: 1.862645149230957e-09
  envelope_clip_events: 0
  rupture_point_diffusion: 0.640
  rupture_post_hoc_diagnostic: |
    All 30 seeds at D=0.640 exhibit P_min=0 and P_max=1 (full saturation
    of the E₁ pressure field at both bounds). 15/30 seeds show K_R=2
    (the Random reference visits only 2 cells out of 64). 4/30 seeds
    yield Δκ = +0.000000 exactly (R, S, M, M_κ all collapsed). The
    fracture is therefore attributable to environment E₁ degeneracy
    under hyper-diffusion, not to a failure of the H₇-κ instrument
    itself. This is a property of the test bed, not of the agent.

