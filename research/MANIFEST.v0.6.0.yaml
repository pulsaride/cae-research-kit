# MANIFEST v0.6.0-h7-κ-boundary
#
# Authority chain: ADR-026 v2.1 → ADR-027 → ADR-030 → ADR-031 / ADR-031.bis
# → ADR-032 (portability E1) → ADR-033 (audit gate, ACCEPTED 2026-05-09)
# → ADR-034 (boundary of validity, ACCEPTED 2026-05-10)
# → ADR-035 (seed-paired replication v0.5.0, ACCEPTED 2026-05-10)
# → this release. All SHAs are SHA-256 in hex.
#
# Sibling manifests: MANIFEST.v0.1.0.yaml … MANIFEST.v0.5.0.yaml.

release:
  tag: v0.6.0-h7-κ-boundary
  date: 2026-05-10
  scientific_status: KAPPA_INCONCLUSIVE
  scientific_status_explanation: |
    Verdict pre-registered ADR-034 §5.4. The override was triggered by a
    single criterion (§3.4 line 130): concordance of Cohen d at the
    reference point D=0.080 between the v0.6.0 sweep pool [4000-4029]
    and the v0.5.0 reference pool [2000-2029] = 3.85% > 1% threshold.
    All six other criteria of ROBUST/BAND_LIMITED were satisfied (see
    extended_validity_envelope below).
  operational_status: kappa_signature_robust_on_validated_envelope
  operational_envelope: "D ∈ [0.005, 0.320] (six octaves around the v0.5.0 calibration D=0.080)"
  rupture_boundary:    "D ≈ 0.640 (E₁ thermodynamic saturation: P_min/P_max collapse to {0,1}, K_R=2)"
  predecessor: v0.5.0-h7-κ-transfers
  one_line_claim: |
    The κ signature published in v0.5.0 (Cohen d = +3.09 at D=0.080) is
    bounded above and below by a six-octave envelope D ∈ [0.005, 0.320]
    on which all 6 grid-points pass (n_pos ≥ 29/30, p < 1.9e-9, d ≥ 2.76,
    0 clip events). A sharp collapse occurs at D = 0.640 (n_pos = 14/30,
    d = 0.52) attributable by post-hoc forensics to environment E₁
    saturation, not to the H₇-κ instrument. The pre-registered
    "concordance vs v0.5.0 ≤ 1%" criterion of ADR-034 §3.4 fired with
    3.85%, but ADR-035 seed-paired replication on pool [2000-2029]
    confirmed the engine is byte-for-byte identical to the v0.5.0
    runner output (CSV SHA-256 match), proving the 3.85% gap is
    sampling noise between disjoint pools at n=30 (~0.46σ), not engine
    drift. The release publishes the formal INCONCLUSIVE verdict
    (protocol honored verbatim) and the empirical BAND_LIMITED
    envelope (defended by ADR-035 PASS).

