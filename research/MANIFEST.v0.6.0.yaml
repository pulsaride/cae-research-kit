audit_trail:
  doctrine: |
    H₅ (v0.1.0) — null regime confirmed (rejection of pressure-scaling claim).
    H₆ (v0.2.0) — apparent topological signature falsified by obs-shuffled control.
    H₇-σ (v0.3.0) — directional inversion published honestly.
    H₇-κ (v0.4.0) — paradox resolved on E₀ (Cohen d = +2.66, p = 9.3e-10).
    H₇-κ portability (v0.5.0) — κ transfers to E₁ at D=0.080 (Cohen d = +3.09).
    H₇-κ boundary (v0.6.0) — formal verdict KAPPA_INCONCLUSIVE per
      ADR-034 §5.4 (concordance v0.5.0 = 3.85% > 1%); operational
      envelope D ∈ [0.005, 0.320] (six octaves, n_pos ≥ 29/30, d ≥ 2.76,
      0 clip events). Rupture at D=0.640 attributable to E₁ saturation,
      not to the H₇-κ instrument. Defended by ADR-035 PASS (engine
      proven byte-for-byte identical to v0.5.0 on the reference pool).

      Seven consecutive pre-registered, frozen, falsification-disciplined
      experiments. The instrument earns trust by refusing to confirm
      itself, by publishing inverted signals as cleanly as confirmations,
      by decomposing those inversions into their minimal structural
      component, by re-running that decomposition under a changed
      environment with a publicly auditable runner, AND by mapping the
      full validity envelope of that result and publishing the formal
      verdict that its own pre-registered rule produces — even when that
      rule fires on a sampling-noise gap.
  pool_status:
    "[1000-1029]":  burned (H5)
    "[1200-1229]":  burned (H6 β)
    "[1300-1329]":  burned (H6 γ)
    "[1400-1429]":  burned (H7-σ main)
