release:
  tag: v0.4.0-h7-κ-reverses
  date: 2026-05-09
  scientific_status: KAPPA_REVERSES
  operational_status: paradox_resolution_published_with_full_data
  predecessor: v0.3.0-h7-σ-inverted
  doi: TBD                       # to be pinned post-Zenodo mint
  doi_concept: 10.5281/zenodo.20091626
  one_line_claim: |
    A single tick of memory on the previous local-pressure observation suffices
    to break the H7-σ inverted-coupling signature. The σ-inversion is the
    memoryless regime; adding m_t = O_{t-1} (1 tick, 0 parameters, no
    learning) returns the agent to the structural side and beyond.

