audit_trail:
  doctrine: |
    H₅ (v0.1.0) — null regime confirmed (rejection of pressure-scaling claim).
    H₆ (v0.2.0) — apparent topological signature falsified by obs-shuffled control.
    H₇-σ (v0.3.0) — directional inversion published honestly: real loop closer
      to Markov-null than obs-shuffled control is.
    H₇-κ (v0.4.0) — paradox resolved: a single tick of memory on the previous
      local-pressure observation breaks the σ inversion (Cohen d = +2.66,
      p = 9.3e-10, 30/30 seeds, 0 clip events). The minimal coupling
      component is local temporal differentiation. The σ inversion is the
      memoryless regime, not an architectural dead end.

      Five consecutive pre-registered, frozen, falsification-disciplined
      experiments, each published with full data, ADR chain, and a
      Zenodo DOI. The instrument earns trust by refusing to confirm itself,
      by publishing inverted signals as cleanly as confirmations, AND by
      decomposing those inversions into their minimal structural component
      under the same protocol.
