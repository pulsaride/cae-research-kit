    binary-level reproducibility.

experiments:
  h7_kappa:
    pre_registration: docs/adr/ADR-030-h7-kappa-pre-registration.md
    upstream_decision: docs/adr/ADR-028-h7-kappa-or-h8-pivot.md
    inherits_statistical_chain: docs/adr/ADR-027-h7-sigma-statistical-chain.md
    inherits_sigma_definitions: docs/adr/ADR-026-v2.1-h7-sigma-amendment-inverted.md
    n_seeds: 30
    seed_range: [1500, 1529]
    seed_pool_reserved: [1500, 1599]
    constants:
      T_warmup: 5000
      T_stat: 50000
      B: 64
      P_min: 0.0
      P_max: 1.0
      scalar: flatten_cell_tick
      laplace: asymmetric_plus_one_on_Q_when_P_gt_0_and_Q_eq_0
      entropy_correction: miller_madow
    agent_under_test:
      name: M_κ
      class: src.agents.memory1_agent.Memory1Agent
      sha256: 2684b171ac5759b9be5a5f5fddced1681558a35cdd5cbe67a47be76e727c7870
      state: m_t ∈ [0,1]^G with G = grid_size; m_0 = 0
      update_rule: m_{t+1} ← O_t (assignment, no parameter)
      policy: A_t = argmax_i(m_t[i] − O_t[i]); tie-break smallest index
      bootstrap: A_0 = argmin_i(O_0[i])
      adt:
        suite: tests/adt/test_memory1_agent.py
        sha256: 01d8203e849c16f2d256efe241444746b1a589ddda16c6b708013e904dc941a9
        n_tests: 5
        all_passed: true
        wall_clock_seconds: 0.24
    test:
      kind: paired_wilcoxon_signed_rank
      tested_quantity: |
        Δ_s = δ_σ^{M_κ}(s) − δ_σ^{R}(s),
        where δ_σ^X(s) = D_KL(P_X(s)‖P_M(s)) − D_KL(P_S(s)‖P_M(s))
      pairing: strict seed-to-seed; R, S, M re-simulated on identical seeds as M_κ
      alternatives:
        - greater
        - less
      zero_method: wilcox
      alpha: 0.005
      cohen_d_threshold_pass: 0.5
      cohen_d_threshold_neutral: 0.2
      double_reporting:
        primary_field: Delta_kappa_corr
        transparency_field: Delta_kappa_naive
        disagreement_override: KAPPA_INCONCLUSIVE
      sample_size_guard:
        n_post_drop_min: 20
        violation_override: KAPPA_INCONCLUSIVE
      clip_override:
        rule: any clip event ⇒ KAPPA_INCONCLUSIVE (stricter than σ)
        observed_total_clip_events: 0
    primary_result:
      statistic_field: Delta_kappa_corr
      wilcoxon_statistic_greater: 465.0
      p_value_greater: 9.313225746154785e-10
      p_value_less: 1.0
      cohen_d: 2.6619418195906856
      n_post_drop: 30
      verdict_isolated_sigma: H7_SIGMA_STRUCTURAL_COUPLING
      verdict_isolated: KAPPA_REVERSES
    transparency_result:
      statistic_field: Delta_kappa_naive
      wilcoxon_statistic_greater: 465.0
      p_value_greater: 9.313225746154785e-10
      p_value_less: 1.0
      cohen_d: 2.6619866378437654
      n_post_drop: 30
      verdict_isolated_sigma: H7_SIGMA_STRUCTURAL_COUPLING
      verdict_isolated: KAPPA_REVERSES
    verdicts_agree: true
    verdict: KAPPA_REVERSES
    diagnostics:
      median_Delta_corr: 0.497928823642
      median_Delta_naive: 0.497931323642
      median_delta_sigma_R_corr: -0.16707908031899998     # confirms R still inverted on [1500-1529]
      median_delta_sigma_Mk_corr: 0.25566726678350005     # M_κ crosses zero, lands structural
      median_K_R: 39.5
      median_K_Mk: 62.0
      median_K_S: 62.0
      median_K_M: 56.0
      median_K_Mk_minus_K_R: 23.0                         # action-repertoire recovery
      n_seeds_Delta_negative: 0
      n_seeds_Delta_positive: 30
      n_seeds_Delta_zero: 0
      total_clip_events: 0
    artefacts:
      - path: research/h7_kappa_run_results.csv
        sha256: 1c4c2cd0450bb646e72b742e99c6a9efda61d9d3c781d0f9a3815241062eae2c
      - path: research/h7_kappa_verdict.json
        sha256: 4b819de7a13f1ea84e6e0f53feb3834ce6cc0a8c345597566502a26308d3c1c2
    interpretation: |
      KAPPA_REVERSES: the H7-σ inverted-coupling signature is fully reversed
      by adding a single tick of memory. Under the pre-registered tested
      quantity Δ_s = δ_σ^{M_κ}(s) − δ_σ^{R}(s), Wilcoxon-greater p = 9.3e-10
      with Cohen d = +2.66 on n = 30 seeds (30/30 with Δ_s > 0; not a single
      counter-example). The transparency reporting on plug-in entropy yields
      the identical verdict at the same p-value; verdicts_agree = true.

      Operational reading. The action-repertoire diagnostic shifts from
      median K_R = 39.5 (R, no memory; consistent with the σ inversion's
      "concentration on a strict subset of state cells") to median K_Mκ = 62.0
      (M_κ, one-tick memory; matches K_S = 62.0). The +23 cell recovery is
      not noise: it is the agent leaving passive stabilisation and entering
      active local-gradient navigation. Memory acts here not as a smoothing
      filter but as a complexity-liberator on the action side.

      Doctrinal claim (within ADR-026 v2.1 §7 vocabulary). The minimal
      structural-coupling component identified in E₀ is local temporal
      differentiation — i.e. the agent's ability to compare O_t with a single
      previous observation. This component is sufficient (one tick, zero
      parameters) to break the σ inversion. The paradox is therefore
      kinetic, not geometric. ADR-028's Option A is vindicated: H8 (deeper
      architectural pivot) is not required to explain the σ regime.

