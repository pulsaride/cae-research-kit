# MANIFEST v0.5.0-h7-κ-transfers
#
# Authority chain: ADR-026 v2.1 (σ chain frozen) → ADR-027 (statistical chain)
# → ADR-028 (option A: κ before H8) → ADR-030 (κ pre-registration)
# → ADR-031 / ADR-031.bis (post-κ trilemma, branch B first) → ADR-032
# (portability E1 pre-registration) → ADR-033 (audit gate, ACCEPTED 2026-05-09)
# → this release. All SHAs are SHA-256 in hex.
#
# Sibling manifests: MANIFEST.v0.1.0.yaml … MANIFEST.v0.4.0.yaml.

release:
  tag: v0.5.0-h7-κ-transfers
  date: 2026-05-10
  scientific_status: KAPPA_TRANSFERS
  operational_status: kappa_signature_holds_under_diffusive_environment
  predecessor: v0.4.0-h7-κ-reverses
  doi: TBD
  doi_concept: TBD
  one_line_claim: |
    The κ signature published in v0.4.0 (one-tick memory breaks the σ inversion
    on E₀) survives an out-of-distribution change to a diffusive environment
    E₁ on a fresh, pre-registered seed pool, with Cohen d = +3.09, paired
    Wilcoxon p = 9.31e-10, and 30/30 seeds positive. The release is gated by
    a public bit-level audit of the v0.4.0 runner (ADR-033 ACCEPTED).

reproduction_image:
  inherits_from: v0.1.0-h5-rejected
  name: cae-research-kit:0.1.0
  image_id: sha256:f30bf02ce6e486153980c79e43e65bf5c195b4fd6ebf052f04ff10537e3ea78e
  base: python:3.11.9-slim-bookworm
  deterministic_fingerprint: 406ce26ec3aeefada7e2250f16d24a89361c1da2041c6775599be394008e7e5f

h7_dev_environment:
  python: 3.12.3
  pinned:
    numpy: 1.26.4
    scipy: 1.12.0
    pytest: 8.1.1
  note: |
    v0.5.0 makes the entire κ pipeline publicly executable end-to-end. The
    private κ runner (.forge_private/h7_dev/) used in v0.4.0 is no longer
    required to reproduce κ on a fresh pool: the public runner
    (src/experiments/portability_draw.py) was independently reimplemented
    against ADR-026 v2.1 / ADR-027 / ADR-030 specs and audited bit-against-bit
    on the v0.4.0 reference seeds [1500-1529] (ADR-033 audit gate).

