# ----------------------------------------------------------------------
# Audit trail (cumulative pool ledger)
# ----------------------------------------------------------------------
audit_trail:
  doctrine: |
    H₅ (v0.1.0) — null regime confirmed (rejection of pressure-scaling claim).
    H₆ (v0.2.0) — apparent topological signature falsified by obs-shuffled control.
    H₇-σ (v0.3.0) — directional inversion published honestly: real loop closer
      to Markov-null than obs-shuffled control is.
    H₇-κ (v0.4.0) — paradox resolved: a single tick of memory on the previous
      local-pressure observation breaks the σ inversion (Cohen d = +2.66,
      p = 9.3e-10, 30/30 seeds, 0 clip events) on E₀.
    H₇-κ portability (v0.5.0) — the κ signature transfers to a calibrated
      diffusive E₁ on a fresh, pre-registered pool [2000-2029] (Cohen d = +3.09,
      p = 9.3e-10, 30/30 seeds, 0 clip events). The release is gated by a
      public bit-level audit of the v0.4.0 runner (ADR-033 ACCEPTED).

      Six consecutive pre-registered, frozen, falsification-disciplined
      experiments. The instrument earns trust by refusing to confirm itself,
      by publishing inverted signals as cleanly as confirmations, by
      decomposing those inversions into their minimal structural component
      under the same protocol, AND by re-running that decomposition under a
      changed environment with a publicly auditable runner.
  pool_status:
    "[1000-1029]":  burned (H5)
    "[1200-1229]":  burned (H6 β)
    "[1300-1329]":  burned (H6 γ)
    "[1400-1429]":  burned (H7-σ main)
    "[9000-9009]":  burned (H7-σ pilot, private)
    "[9100-9109]":  available (never drawn; reserved for remediation only)
    "[1500-1529]":  "burned (H7-κ main, v0.4.0; re-used here for the public audit gate per ADR-033, which is by construction non-tirage: no new statistical claim is made on this pool)"
    "[1530-1599]":  reserved within H7-κ pool; FROZEN pending future ADR
    "[2000-2029]":  burned (H7-κ portability E₁ main, this release)
    "[2030-2099]":  reserved within portability pool; FROZEN pending future ADR
