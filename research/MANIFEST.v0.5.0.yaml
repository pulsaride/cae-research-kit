# ----------------------------------------------------------------------
# PORTABILITY EXPERIMENT — the v0.5.0 verdict
# ----------------------------------------------------------------------
experiments:
  h7_kappa_portability:
    pre_registration: docs/adr/ADR-032-h7-kappa-portability-e1.md
    pre_registration_sha256: 4e87aa4e7ef82bd06f433f8a160d7f1924c2292a65cfe0be6ccd547567f4e749
    upstream_decision: docs/adr/ADR-031-post-kappa-trilemma-b-first.md
    upstream_decision_sha256: fb1a52ea74ce8a03b8f51996ce370dddc58d764a7b3991be751d3bf57648e841
    upstream_decision_supersession: docs/adr/ADR-031.bis-supersede-section-5-3.md
    upstream_decision_supersession_sha256: f462853157fb44ee22206b334c65726d55cb5c9f2b45da7c3f2bbb3fc920f3f9
    inherits_statistical_chain: docs/adr/ADR-027-h7-sigma-statistical-chain.md
    inherits_kappa_specification: docs/adr/ADR-030-h7-kappa-pre-registration.md
    n_seeds: 30
    seed_range: [2000, 2029]
    seed_pool_reserved: [2000, 2099]
    environment_under_test:
      name: E₁ (diffusive)
      class: src.env.e1.E1
      calibration: research/calibration_e1.json
      relation_to_e0: |
        E₁ is the calibrated diffusive variant of E₀: identical state
        topology and observation map, with a diffusion kernel applied to
        the local pressure update. The κ signature in v0.4.0 was measured
        on E₀; v0.5.0 tests whether it survives the change of medium.
    constants:
      T_warmup: 5000
      T_stat: 50000
      T_total: 55000
      B: 64
      grid_size: 64
      P_min: 0.0
      P_max: 1.0
      scalar: flatten_cell_tick
      laplace: asymmetric_plus_one_on_Q_when_P_gt_0_and_Q_eq_0
      entropy_correction: miller_madow
      markov_dirichlet_alpha: 1.0
    agent_under_test:
      name: M_κ
      class: src.agents.memory1_agent.Memory1Agent
      sha256: 2684b171ac5759b9be5a5f5fddced1681558a35cdd5cbe67a47be76e727c7870
      bit_identical_to_v04: true
    test:
      kind: paired_wilcoxon_signed_rank
      tested_quantity: |
        Δ_s = δ_σ^{M_κ}(s) − δ_σ^{R}(s),
        where δ_σ^X(s) = D_KL(P_X(s)‖P_M(s)) − D_KL(P_S(s)‖P_M(s)),
        all four branches (R, S, M, M_κ) re-simulated on identical seeds
        on E₁.
      pairing: strict seed-to-seed
      alternatives: [greater, less]
      zero_method: wilcox
      alpha: 0.005
      cohen_d_threshold_pass: 0.5
      cohen_d_threshold_neutral: 0.2
      double_reporting:
        primary_field: Delta_kappa_corr
        transparency_field: Delta_kappa_naive
        disagreement_override: KAPPA_INCONCLUSIVE
      sample_size_guard:
        n_post_drop_min: 20
        violation_override: KAPPA_INCONCLUSIVE
      clip_override:
        rule: any clip event ⇒ KAPPA_INCONCLUSIVE
        observed_total_clip_events: 0
    primary_result:
      statistic_field: Delta_kappa_corr
      p_value_greater: 9.313225746154785e-10
      cohen_d: 3.090641237972993
      n_post_drop: 30
      n_seeds_Delta_positive: 30
      n_seeds_Delta_negative: 0
      n_seeds_Delta_zero: 0
      verdict_isolated: KAPPA_TRANSFERS
    transparency_result:
      statistic_field: Delta_kappa_naive
      p_value_greater: 9.313225746154785e-10
      cohen_d: 3.090653026205383
      n_post_drop: 30
      n_seeds_Delta_positive: 30
      n_seeds_Delta_negative: 0
      n_seeds_Delta_zero: 0
      verdict_isolated: KAPPA_TRANSFERS
    verdicts_agree: true
    verdict: KAPPA_TRANSFERS
    diagnostics:
      median_Delta_kappa_corr:        0.600635782168
      median_Delta_kappa_naive:       0.600638829066
      median_delta_sigma_R_corr:     -0.179232065439     # R remains on the σ-inverted side under E₁
      median_delta_sigma_Mk_corr:    +0.399008079201     # M_κ still crosses to the structural side
      min_Delta_kappa_corr:           0.238852557970     # seed=2000
      max_Delta_kappa_corr:           1.114947226055     # seed=2019
      median_K_R:  35.0
      median_K_S:  55.0
      median_K_M:  51.0
      median_K_Mk: 57.0
      total_clip_events: 0
    artefacts:
      - path: research/h7_kappa_portability.csv
        sha256: b532d938b443ab75c5cef2c3063f4c7a827cf99a5fa31860a3b9ee83c02829ee
      - path: research/h7_kappa_portability_verdict.json
        sha256: 1b7f4ee09935a893a34a678235295b63e119aec41631448d5d15ce58218dc3d8
    interpretation: |
      KAPPA_TRANSFERS: the v0.4.0 κ signature is not specific to E₀. Under
      the same pre-registered statistical chain (ADR-027), on a fresh seed
      pool [2000-2029] never used in any prior tirage, in a diffusive E₁
      environment calibrated independently of κ, the paired Wilcoxon test
      on Δ_s = δ_σ^{M_κ} − δ_σ^{R} returns p_greater = 9.3e-10 with
      Cohen d = +3.09 on both reporting branches simultaneously
      (verdicts_agree = true, 0 clip events, 30/30 seeds positive).

      Diagnostic reading. R remains on the σ-inverted side under E₁
      (median δ_σ^R_corr = −0.18, same sign as on E₀ in v0.4.0). M_κ
      still crosses to the structural side (median δ_σ^{M_κ}_corr = +0.40).
      The action-repertoire diagnostic shifts from median K_R = 35 to
      K_{M_κ} = 57 (+22 cells), of the same order as the +23 recovery
      reported in v0.4.0 on E₀. The κ mechanism — local temporal
      differentiation — is therefore not an artefact of E₀'s specific
      pressure dynamics: it transfers across a calibrated change of medium.

      Doctrinal claim (within ADR-026 v2.1 §7 vocabulary). The minimal
      structural-coupling component identified in E₀ (one-tick memory)
      retains its measurable effect on the σ inversion when the
      environment is replaced by a diffusive variant. v0.5.0 thus closes
      the portability question raised by ADR-031 (branch B) without
      requiring an architectural pivot (H8 remains unwarranted).

